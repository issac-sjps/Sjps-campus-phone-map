<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新莊國小 Campus Phone &amp; Map</title>
<style>
  :root {
    --primary: #1a5c8a;
    --primary-light: #e8f2f9;
    --primary-mid: #4a8db5;
    --accent: #e07b39;
    --accent-light: #fdf0e6;
    --success: #2e7d52;
    --success-light: #e8f5ee;
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #dde3ea;
    --text: #1a2332;
    --text-muted: #5a6a7e;
    --text-light: #8a9ab0;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    --radius: 8px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--primary);
    color: #fff;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-top {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .school-name { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  .year-badge {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0;
  }
  .year-badge:hover { background: rgba(255,255,255,0.28); }

  /* Search bar embedded in header */
  .header-search {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 680px;
  }
  .header-search-wrap { position: relative; flex: 1; }
  .header-search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); width: 14px; height: 14px; }
  .header-search-input {
    width: 100%; padding: 6px 12px 6px 32px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    font-size: 13px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    outline: none;
    transition: all 0.15s;
  }
  .header-search-input::placeholder { color: rgba(255,255,255,0.6); }
  .header-search-input:focus { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.7); }
  .header-search-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px;
    border-radius: 16px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.12);
    color: #fff;
    transition: all 0.15s; white-space: nowrap;
    flex-shrink: 0;
  }
  .header-search-btn:hover { background: rgba(255,255,255,0.22); }
  .header-search-btn svg { width: 13px; height: 13px; }

  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* Tabs inside header */
  .header-tabs {
    display: flex;
    align-items: flex-end;
    gap: 0;
    padding: 0 0;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .tab {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
    user-select: none;
  }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom-color: #fff; }

  /* Legend text in tab row */
  .tab-legend {
    margin-left: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 10px;
    flex: 1;
  }
  .tab-legend span { display: flex; align-items: center; gap: 4px; }
  .tab-legend .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

  /* Old .tabs class fallback (unused now) */
  .tabs-unused { display: none; }
  #edit-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: transparent;
    color: #fff;
  }
  #edit-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.8); }
  #edit-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #edit-btn svg { width: 14px; height: 14px; }

  /* Edit status bar */
  #edit-bar {
    display: none;
    background: var(--accent-light);
    border-bottom: 1px solid #f0c090;
    padding: 8px 24px;
    font-size: 13px;
    color: #b05010;
    align-items: center;
    gap: 8px;
  }
  #edit-bar.visible { display: flex; }
  #edit-bar .save-btn {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  #edit-bar .save-btn:hover { background: #c06028; }
  #edit-bar .discard-btn {
    background: transparent;
    color: #b05010;
    border: 1px solid #f0c090;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }

  /* Edit button */
  main { max-width: 100%; margin: 0; padding: 14px 16px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Phone tab ── */
  .toolbar {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-light); width: 16px; height: 16px; }
  .search-input {
    width: 100%; padding: 8px 12px 8px 34px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--primary); }
  .toolbar-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
  }
  .toolbar-btn:hover { border-color: var(--primary-mid); color: var(--primary); }
  .toolbar-btn svg { width: 15px; height: 15px; }
  .toolbar-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .toolbar-btn.primary:hover { background: #154d76; }

  /* Phone table */
  .phone-table-wrap {
    background: var(--surface); border-radius: var(--radius-lg);
    box-shadow: var(--shadow); overflow: hidden;
  }
  /* 5-column grid layout for phone table */
  .phone-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0 1px;
    background: var(--border);
  }
  .phone-col {
    background: var(--surface);
    overflow: hidden;
  }
  .phone-col:first-child { border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
  .phone-col:last-child  { border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--primary); color: #fff;
    padding: 7px 8px; text-align: left;
    font-size: 11px; font-weight: 600;
  }
  tbody tr { border-bottom: 1px solid #edf0f4; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--primary-light); }
  td { padding: 4px 8px; font-size: 12px; }
  td.id-col { color: var(--text-light); font-size: 10px; width: 28px; }
  td.id-star-cell { cursor: default; }
  body.edit-mode td.id-star-cell { cursor: pointer; }
  body.edit-mode td.id-star-cell:hover { background: #fff8e1; }
  td.ext-col { font-weight: 700; color: var(--primary); font-family: monospace; font-size: 12px; white-space: nowrap; }
  td.name-col .star { color: var(--accent); font-size: 10px; margin-right: 1px; }

  /* Editable cells */
  body.edit-mode td.editable { cursor: pointer; position: relative; }
  body.edit-mode td.editable:hover { background: #fff8e1; }
  body.edit-mode td.editable:hover::after {
    content: '✎';
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    font-size: 10px; color: var(--accent); opacity: 0.7;
  }
  .inline-edit {
    width: 100%; border: 1.5px solid var(--accent); border-radius: 3px;
    padding: 2px 4px; font-size: 12px; background: #fffdf8;
    outline: none; font-family: inherit;
  }

  /* Category group header */
  .cat-header td {
    background: var(--primary-light);
    color: var(--primary);
    font-size: 10px;
    font-weight: 700;
    padding: 4px 8px;
    letter-spacing: 0.04em;
  }
  .cat-add-btn {
    display: none;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
  }
  body.edit-mode .cat-add-btn { display: inline-block; }
  body.edit-mode .cat-add-btn:hover { background: #154d76; }

  /* Add row button */
  .add-row-btn {
    display: none;
    width: 100%; padding: 10px;
    background: none; border: none;
    color: var(--primary); font-size: 13px;
    cursor: pointer; text-align: center;
  }
  body.edit-mode .add-row-btn { display: block; }
  .add-row-btn:hover { background: var(--primary-light); }

  /* Footer meta */
  .meta-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; font-size: 12px; color: var(--text-light);
    padding: 0 4px;
  }

  /* ── Map tab ── */
  .map-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .building-tabs { display: flex; gap: 4px; }
  .btab {
    padding: 7px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-muted); transition: all 0.15s;
  }
  .btab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btab:hover:not(.active) { border-color: var(--primary-mid); color: var(--primary); }

  .building-map { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 16px; }
  .building-title { font-size: 15px; font-weight: 600; color: var(--primary); margin-bottom: 12px; }
  .floor-section { margin-bottom: 12px; }
  .floor-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.06em; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .floor-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .rooms-grid { display: flex; flex-wrap: wrap; gap: 4px; }
  .room-card {
    border: 1.5px solid var(--border); border-radius: 6px;
    padding: 5px 8px; min-width: 88px; max-width: 130px;
    background: var(--surface); cursor: default;
    transition: all 0.15s; position: relative;
  }
  .room-card.has-class { border-left: 3px solid var(--primary); }
  .room-card.has-office { border-left: 3px solid var(--accent); }
  .room-card.has-special { border-left: 3px solid var(--success); }
  .room-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .room-code { font-size: 10px; color: var(--text-light); margin-top: 1px; }
  .room-ext { font-size: 11px; font-weight: 600; color: var(--primary); margin-top: 2px; font-family: monospace; }

  body.edit-mode .room-card { cursor: pointer; }
  body.edit-mode .room-card:hover { border-color: var(--accent); background: #fffdf8; box-shadow: 0 2px 8px rgba(224,123,57,0.15); }

  /* Add room button (edit mode) */
  .add-room-btn {
    display: none;
    border: 1.5px dashed var(--border); border-radius: 6px;
    padding: 5px 8px; min-width: 72px;
    background: none; color: var(--text-light);
    font-size: 11px; cursor: pointer; transition: all 0.15s;
  }
  body.edit-mode .add-room-btn { display: flex; align-items: center; justify-content: center; gap: 3px; }
  body.edit-mode .add-room-btn:hover { border-color: var(--accent); color: var(--accent); background: #fffdf8; }

  /* Room edit modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 24px; width: 340px; max-width: 90vw;
    box-shadow: var(--shadow-md);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--primary); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; outline: none; transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-group input:focus { border-color: var(--primary); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-actions button {
    padding: 7px 18px; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border);
  }
  .btn-save { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-cancel { background: var(--surface); color: var(--text-muted); }

  /* Year picker dropdown */
  .year-dropdown {
    display: none; position: absolute;
    top: 52px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 8px;
    box-shadow: var(--shadow-md); z-index: 150; min-width: 140px;
  }
  .year-dropdown.visible { display: block; }
  .year-option {
    padding: 8px 12px; border-radius: 6px; font-size: 14px;
    cursor: pointer; transition: background 0.1s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .year-option:hover { background: var(--primary-light); color: var(--primary); }
  .year-option.active { font-weight: 600; color: var(--primary); }
  .year-option .check { color: var(--primary); font-size: 12px; }
  .year-new { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }
  .year-new .year-option { color: var(--text-muted); font-size: 13px; }

  /* Last edited */
  #last-edit-phone, #last-edit-map { font-size: 11px; color: var(--text-light); }

  /* Print styles */
  @media print {
    @page { size: A4 landscape; margin: 10mm 8mm; }

    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    header, .tabs, .toolbar, .edit-bar, .meta-bar, .modal-overlay,
    #pw-modal, #room-modal, .add-row-btn { display: none !important; }
    body { background: #fff; font-size: 11px; }
    main { padding: 0; max-width: 100%; }

    /* Show only the active panel */
    .tab-panel { display: none !important; }
    .tab-panel.active { display: block !important; }

    /* ── Phone print: 3-column layout like original ── */
    #panel-phone .phone-table-wrap { box-shadow: none; border: none; }
    #panel-phone { }

    .print-header {
      text-align: center; margin-bottom: 6mm;
    }
    .print-header h1 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .print-header p { font-size: 11px; color: #555; }

    /* Split phone data into 3 columns */
    #phone-print-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      gap: 0 3mm;
      width: 100%;
    }
    #phone-print-grid table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      break-inside: avoid-column;
    }
    #phone-print-grid table thead th {
      background: #1a5c8a !important;
      color: #fff !important;
      padding: 3px 5px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid #1a5c8a;
    }
    #phone-print-grid table tbody tr { border-bottom: 1px solid #e0e0e0; }
    #phone-print-grid table tbody td { padding: 2.5px 5px; vertical-align: middle; }
    #phone-print-grid .p-cat td {
      background: #dde8f0 !important;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px; color: #1a5c8a;
    }
    #phone-print-grid .p-ext { font-weight: 700; color: #1a5c8a; font-family: monospace; }
    #phone-print-grid .p-star { color: #c0560a; font-weight: 700; }

    /* Hide screen phone table in print */
    #panel-phone .phone-table-wrap,
    #panel-phone .toolbar { display: none !important; }
    #phone-print-root { display: block !important; }

    /* ── Map print ── */
    #panel-map .map-controls { display: none !important; }
    #map-print-root { display: block !important; }
    #building-map { display: none !important; }

    .map-print-page { page-break-after: always; }
    .map-print-page:last-child { page-break-after: avoid; }
    .map-print-title { font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 4mm; color: #1a5c8a; }
    .map-print-floor { margin-bottom: 4mm; }
    .map-print-floor-label {
      font-size: 10px; font-weight: 700; color: #1a5c8a;
      border-bottom: 1.5px solid #1a5c8a; margin-bottom: 2mm; padding-bottom: 1mm;
    }
    .map-print-rooms { display: flex; flex-wrap: wrap; gap: 2mm; }
    .map-print-room {
      border: 1px solid #bbb; border-radius: 3px; padding: 2mm 3mm;
      min-width: 28mm; font-size: 9px; line-height: 1.4;
    }
    .map-print-room.has-class { border-left: 3px solid #1a5c8a; }
    .map-print-room.has-office { border-left: 3px solid #e07b39; }
    .map-print-room.has-special { border-left: 3px solid #2e7d52; }
    .map-print-room .r-name { font-weight: 600; }
    .map-print-room .r-code { color: #888; font-size: 8px; }
    .map-print-room .r-ext { color: #1a5c8a; font-weight: 700; font-size: 9px; }
  }
  /* Hidden on screen, shown on print */
  #phone-print-root { display: none; }
  #map-print-root { display: none; }

  /* Responsive */
  @media (max-width: 640px) {
    main { padding: 12px; }
    header { padding: 0 12px; }
    .school-name { font-size: 13px; }
    td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-left">
      <div class="school-name">新莊國小 Campus Phone &amp; Map</div>
      <div class="year-badge" id="year-toggle" onclick="toggleYearPicker()">
        <span id="current-year-label">114學年度</span>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="header-search" id="header-search-area">
      <div class="header-search-wrap">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3 3"/></svg>
        <input class="header-search-input" type="text" placeholder="搜尋姓名、職稱或分機號碼…" id="phone-search" oninput="filterPhone()">
      </div>
      <button class="header-search-btn" onclick="window.print()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="5" width="12" height="8" rx="1"/><path d="M5 5V2h6v3M5 12h6"/></svg>
        列印
      </button>
      <button class="header-search-btn" onclick="exportExcel()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L9 2z"/><path d="M9 2v4h4M6 9l4 4M10 9l-4 4"/></svg>
        下載 Excel
      </button>
    </div>
    <div class="header-right">
      <button id="edit-btn" onclick="toggleEdit()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M11 2L14 5L6 13H3V10L11 2Z"/>
        </svg>
        <span id="edit-label">編輯</span>
      </button>
    </div>
  </div>
  <div class="header-tabs">
    <div class="tab active" onclick="switchTab('phone', this)" id="tab-phone">
      <svg width="13" height="13" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 2h3l1.5 3-2 1.5a9 9 0 003 3L10 8l3 1.5V13a1 1 0 01-1 1C5 14 1 10 1 4a1 1 0 011-1z"/></svg>
      分機一覽
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDK-YvxvjAee_VDUmcfK3O-3YhubMyKx-4",
  authDomain: "sjps-campus-phone-map.firebaseapp.com",
  projectId: "sjps-campus-phone-map",
  storageBucket: "sjps-campus-phone-map.firebasestorage.app",
  messagingSenderId: "796761997242",
  appId: "1:796761997242:web:4d6aa9ad791b0ed9e16783",
  measurementId: "G-E741WSKVPR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window._db = db;
window._doc = doc;
window._getDoc = getDoc;
window._setDoc = setDoc;

// Load data for current year
async function loadYear(year) {
  try {
    const phoneRef = doc(db, 'extensions', String(year));
    const mapRef = doc(db, 'rooms', String(year));
    const [phoneSnap, mapSnap] = await Promise.all([getDoc(phoneRef), getDoc(mapRef)]);

    if (phoneSnap.exists()) {
      window.APP.phoneData = phoneSnap.data().staff || window.APP.defaultPhone;
      window.APP.phoneLastEdit = phoneSnap.data().last_edited || '';
    } else {
      window.APP.phoneData = JSON.parse(JSON.stringify(window.APP.defaultPhone));
    }
    if (mapSnap.exists()) {
      window.APP.mapData = mapSnap.data().buildings || window.APP.defaultMap;
      window.APP.mapLastEdit = mapSnap.data().last_edited || '';
    } else {
      window.APP.mapData = JSON.parse(JSON.stringify(window.APP.defaultMap));
    }
  } catch(e) {
    console.warn('Firebase load failed, using local data:', e);
    window.APP.phoneData = JSON.parse(JSON.stringify(window.APP.defaultPhone));
    window.APP.mapData = JSON.parse(JSON.stringify(window.APP.defaultMap));
  }
  window.renderPhone();
  window.renderMap();
}

async function saveToFirebase(year) {
  try {
    const now = new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'});
    await window._setDoc(window._doc(window._db, 'extensions', String(year)), {
      staff: window.APP.phoneData,
      last_edited: now
    });
    await window._setDoc(window._doc(window._db, 'rooms', String(year)), {
      buildings: window.APP.mapData,
      last_edited: now
    });
    window.APP.phoneLastEdit = now;
    window.APP.mapLastEdit = now;
    document.getElementById('last-edit-phone').textContent = '最後編輯：' + now;
    document.getElementById('last-edit-map').textContent = '最後編輯：' + now;
    return true;
  } catch(e) {
    alert('儲存失敗，請確認網路連線。\n' + e.message);
    return false;
  }
}

window._loadYear = loadYear;
window._saveToFirebase = saveToFirebase;

// Init
window.APP.currentYear = 114;
loadYear(114);
</script>

// ─── Category mapping ─────────────────────────────────────
const CAT_ORDER = [
  { key: 'admin', label: '行政人員', match: t => ['校　　長','教務主任','學務主任','總務主任','輔導主任','會計主任','人事主任'].includes(t) },
  { key: 'group', label: '各組組長', match: t => t.includes('處-') },
  { key: 'g1', label: '一年級', match: t => /^1\d\d$/.test(t) },
  { key: 'g2', label: '二年級', match: t => /^2\d\d$/.test(t) },
  { key: 'g3', label: '三年級', match: t => /^3\d\d$/.test(t) },
  { key: 'g4', label: '四年級', match: t => /^4\d\d$/.test(t) },
  { key: 'g5', label: '五年級', match: t => /^5\d\d$/.test(t) },
  { key: 'g6', label: '六年級', match: t => /^6\d\d$/.test(t) },
  { key: 'sub', label: '科任／代課教師', match: t => t.startsWith('科任') || t.startsWith('代課') },
  { key: 'sp', label: '特殊班級', match: t => t.startsWith('資優') || t.startsWith('資源') },
  { key: 'kinder', label: '幼兒園', match: t => t.startsWith('幼兒') || t.startsWith('學前') },
  { key: 'support', label: '支援人員', match: t => true }
];

function getCategory(title) {
  for (const cat of CAT_ORDER) if (cat.match(title)) return cat;
  return CAT_ORDER[CAT_ORDER.length - 1];
}

// ─── Phone render ─────────────────────────────────────────
window.renderPhone = function(filter = '') {
  const data = APP.phoneData;
  const q = filter.trim().toLowerCase();
  const filtered = q ? data.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.title.toLowerCase().includes(q) ||
    r.ext.includes(q)
  ) : data;

  // Build ordered flat list with category headers
  const groups = {};
  filtered.forEach(r => {
    const cat = getCategory(r.title);
    if (!groups[cat.key]) groups[cat.key] = { label: cat.label, key: cat.key, rows: [] };
    groups[cat.key].rows.push(r);
  });

  // Flatten: [{isCat, label, key} | {row data}]
  const flat = [];
  CAT_ORDER.forEach(cat => {
    if (!groups[cat.key] || !groups[cat.key].rows.length) return;
    flat.push({ isCat: true, label: cat.label, key: cat.key });
    groups[cat.key].rows.forEach(r => flat.push({ isCat: false, ...r }));
  });

  // Distribute evenly across 5 columns
  const total = flat.length;
  const colSize = Math.ceil(total / 5);
  const cols = [
    flat.slice(0, colSize),
    flat.slice(colSize, colSize * 2),
    flat.slice(colSize * 2, colSize * 3),
    flat.slice(colSize * 3, colSize * 4),
    flat.slice(colSize * 4)
  ];

  function rowHtml(item) {
    if (item.isCat) {
      return `<tr class="cat-header">
        <td colspan="3">${item.label}</td>
        <td style="text-align:right;padding-right:6px">
          <button class="cat-add-btn" onclick="addRowInCat('${item.key}')">＋</button>
        </td>
      </tr>`;
    }
    const isStar = item.name.startsWith('★');
    const displayName = isStar ?
      `<span class="star">★</span>${item.name.slice(1)}` : item.name;
    const idDisplay = isStar ? '★' : item.id;
    const idStyle = isStar ? 'color:var(--accent);font-weight:700' : 'color:var(--text-light)';
    return `<tr data-id="${item.id}">
      <td class="id-col id-star-cell" onclick="toggleStar('${item.id}')" style="${idStyle}" title="編輯模式下可標記學年主任">${idDisplay}</td>
      <td class="editable" onclick="editCell(this,'title')">${item.title}</td>
      <td class="name-col editable" onclick="editCell(this,'name')">${displayName}</td>
      <td class="ext-col editable" onclick="editCell(this,'ext')">${item.ext}</td>
    </tr>`;
  }

  cols.forEach((col, i) => {
    const el = document.getElementById(`phone-tbody-${i}`);
    if (el) el.innerHTML = col.map(rowHtml).join('');
  });

  const total2 = filtered.length;
  document.getElementById('phone-count').textContent = `共 ${total2} 筆${q ? '（篩選中）' : ''}`;
  if (APP.phoneLastEdit) document.getElementById('last-edit-phone').textContent = '最後編輯：' + APP.phoneLastEdit;
};

window.filterPhone = function() {
  renderPhone(document.getElementById('phone-search').value);
};

window.toggleStar = function(id) {
  if (!APP.editMode) return;
  const record = APP.phoneData.find(r => String(r.id) === String(id));
  if (!record) return;
  if (record.name.startsWith('★')) {
    record.name = record.name.slice(1);
  } else {
    record.name = '★' + record.name;
  }
  APP.pendingChanges = true;
  renderPhone(document.getElementById('phone-search').value);
};

// ─── Inline cell edit ─────────────────────────────────────
window.editCell = function(td, field) {
  if (!APP.editMode) return;
  if (td.querySelector('input')) return;
  const row = td.closest('tr');
  const id = row.dataset.id;
  const record = APP.phoneData.find(r => String(r.id) === String(id));
  if (!record) return;
  const orig = record[field];
  const val = field === 'name' && orig.startsWith('★') ? orig.slice(1) : orig;
  td.innerHTML = `<input class="inline-edit" value="${val}" onblur="commitCell(this,'${id}','${field}')" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value='${val}';this.blur();}">`;
  td.querySelector('input').focus();
  APP.pendingChanges = true;
};

window.commitCell = function(input, id, field) {
  const record = APP.phoneData.find(r => String(r.id) === String(id));
  if (record) record[field] = input.value.trim();
  renderPhone(document.getElementById('phone-search').value);
};

window.addRow = function() {
  const newId = String(Math.max(...APP.phoneData.map(r => parseInt(r.id) || 0)) + 1);
  APP.phoneData.push({ id: newId, title: '新職稱', name: '姓名', ext: '000' });
  APP.pendingChanges = true;
  renderPhone();
};

window.addRowInCat = function(catKey) {
  if (!APP.editMode) return;
  // Find the last row of this category to insert after it
  const cat = CAT_ORDER.find(c => c.key === catKey);
  if (!cat) return;
  // Find insertion index: after last matching item
  let insertAfter = -1;
  APP.phoneData.forEach((r, i) => { if (cat.match(r.title)) insertAfter = i; });
  const newId = String(Math.max(...APP.phoneData.map(r => parseInt(r.id) || 0)) + 1);
  // Use the category's typical title as default
  const defaultTitle = APP.phoneData.find(r => cat.match(r.title))?.title || cat.label;
  const newRow = { id: newId, title: defaultTitle, name: '姓名', ext: '000' };
  if (insertAfter >= 0) {
    APP.phoneData.splice(insertAfter + 1, 0, newRow);
  } else {
    APP.phoneData.push(newRow);
  }
  APP.pendingChanges = true;
  renderPhone();
  // Focus on the new row's name cell after render
  setTimeout(() => {
    const row = document.querySelector(`tr[data-id="${newId}"] td.name-col`);
    if (row) row.click();
  }, 50);
};

// ─── Map render ───────────────────────────────────────────
window.renderMap = function() {
  const bdata = APP.mapData[APP.currentBuilding] || {};
  const bnames = { A: '新莊樓', B: '至美樓', F: '至誠樓', C: '至善樓', Z: '至真樓（暫不開放）' };
  let html = `<div class="building-title">${bnames[APP.currentBuilding]}</div>`;

  const floorOrder = ['5F','4F','3F','2F','1F'];
  floorOrder.forEach(floor => {

    if (!rooms || !rooms.length) return;
    html += `<div class="floor-section">
      <div class="floor-label">${floor}</div>
      <div class="rooms-grid">`;
    rooms.forEach((room, idx) => {
      const typeClass = room.type === 'class' ? 'has-class' : room.type === 'office' ? 'has-office' : 'has-special';
      html += `<div class="room-card ${typeClass}" onclick="openRoomEdit('${APP.currentBuilding}','${floor}',${idx})">
        <div class="room-name">${room.name}</div>
        ${room.code ? `<div class="room-code">${room.code}</div>` : ''}

  html += `<div style="margin-top:20px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--primary);display:inline-block"></span>班級教室</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--accent);display:inline-block"></span>行政辦公室</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:var(--success);display:inline-block"></span>特殊/專科</span>
  </div>`;

  document.getElementById('building-map').innerHTML = html;
  if (APP.mapLastEdit) document.getElementById('last-edit-map').textContent = '最後編輯：' + APP.mapLastEdit;
};

window.switchBuilding = function(b, el) {

  el.classList.add('active');

};

// ─── Print renderers ──────────────────────────────────────
function buildPhonePrint() {
  const data = APP.phoneData;
  const year = APP.currentYear;
  const lastEdit = APP.phoneLastEdit || '';

  // Group into categories
  const groups = [];
  const seen = {};
  data.forEach(r => {
    const cat = getCategory(r.title);
    if (!seen[cat.key]) { seen[cat.key] = true; groups.push({ label: cat.label, key: cat.key, rows: [] }); }
    groups.find(g => g.key === cat.key).rows.push(r);
  });

  // Flatten into rows with category headers
  const allRows = [];
  groups.forEach(g => {
    if (!g.rows.length) return;
    allRows.push({ isCat: true, label: g.label });
    g.rows.forEach(r => allRows.push({ isCat: false, ...r }));
  });

  // Split into 4 columns as evenly as possible
  const total = allRows.length;
  const colSize = Math.ceil(total / 5);
  const cols = [allRows.slice(0, colSize), allRows.slice(colSize, colSize * 2), allRows.slice(colSize * 2, colSize * 3), allRows.slice(colSize * 3, colSize * 4), allRows.slice(colSize * 4)];

  function colHtml(rows) {
    if (!rows.length) return '';
    let h = `<table><thead><tr><th>#</th><th>職稱</th><th>姓名</th><th>分機</th></tr></thead><tbody>`;
    rows.forEach(r => {
      if (r.isCat) {
        h += `<tr class="p-cat"><td colspan="4">${r.label}</td></tr>`;
      } else {
        const isStar = r.name.startsWith('★');
        const nameHtml = isStar ? `<span class="p-star">★</span>${r.name.slice(1)}` : r.name;
        h += `<tr><td>${r.id}</td><td>${r.title}</td><td>${nameHtml}</td><td class="p-ext">${r.ext}</td></tr>`;
      }
    });
    h += `</tbody></table>`;
    return h;
  }

  return `
    <div class="print-header">
      <h1>新莊國小 ${year}學年度 教職員工分機一覽表</h1>
      <p>★ 學年主任　　最後更新：${lastEdit || '—'}</p>
    </div>
    <div id="phone-print-grid">
      <div>${colHtml(cols[0])}</div>
      <div>${colHtml(cols[1])}</div>
      <div>${colHtml(cols[2])}</div>
      <div>${colHtml(cols[3])}</div>
      <div>${colHtml(cols[4])}</div>
    </div>`;
}

          <div class="r-name">${room.name}</div>
          ${room.code ? `<div class="r-code">${room.code}</div>` : ''}
          ${room.ext ? `<div class="r-ext">☎ ${room.ext}</div>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `<div style="font-size:9px;color:#999;margin-top:4mm;text-align:right">最後更新：${lastEdit || '—'}</div></div>`;
  });
  return html;
}

// Hook into browser print event to inject print layout
window.addEventListener('beforeprint', () => {
  document.getElementById('phone-print-root').innerHTML = buildPhonePrint();
  document.getElementById('map-print-root').innerHTML = buildMapPrint();
});
window.addEventListener('afterprint', () => {
  document.getElementById('phone-print-root').innerHTML = '';
  document.getElementById('map-print-root').innerHTML = '';
});

// ─── Room modal ───────────────────────────────────────────
window.openRoomEdit = function(building, floor, idx) {
  if (!APP.editMode) return;
  const room = APP.mapData[building][floor][idx];
  APP.editingRoomKey = { building, floor, idx };
  document.getElementById('modal-name').value = room.name;
  document.getElementById('modal-code').value = room.code || '';
  document.getElementById('modal-ext').value = room.ext || '';
  document.getElementById('modal-type').value = room.type || 'special';
  document.getElementById('room-modal').classList.add('visible');
};

window.closeModal = function() {
  document.getElementById('room-modal').classList.remove('visible');
};

window.saveRoom = function() {
  const { building, floor, idx } = APP.editingRoomKey;
  APP.mapData[building][floor][idx] = {
    ...APP.mapData[building][floor][idx],
    name: document.getElementById('modal-name').value.trim(),
    code: document.getElementById('modal-code').value.trim(),
    ext: document.getElementById('modal-ext').value.trim(),
    type: document.getElementById('modal-type').value
  };
  APP.pendingChanges = true;
  closeModal();
  renderMap();
};

window.addRoom = function(building, floor) {
  if (!APP.editMode) return;
  APP.editingRoomKey = { building, floor, idx: APP.mapData[building][floor].length };
  APP.mapData[building][floor].push({ name: '新教室', code: '', ext: '', type: 'special' });
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-code').value = '';
  document.getElementById('modal-ext').value = '';
  document.getElementById('room-modal').classList.add('visible');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
  APP.pendingChanges = true;
};

// Close modal on overlay click
document.getElementById('room-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Edit mode ────────────────────────────────────────────
const EDIT_PASSWORD = '073411373';

window.toggleEdit = function() {
  if (!APP.editMode) {
    // Show password modal to enter edit mode
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').style.display = 'none';
    document.getElementById('pw-modal').classList.add('visible');
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  } else {
    _exitEditMode();
  }
};

function _enterEditMode() {
  APP.editMode = true;
  document.body.classList.add('edit-mode');
  document.getElementById('edit-btn').classList.add('active');
  document.getElementById('edit-label').textContent = '編輯中';
  document.getElementById('edit-bar').classList.add('visible');
}

function _exitEditMode() {
  APP.editMode = false;
  document.body.classList.remove('edit-mode');
  document.getElementById('edit-btn').classList.remove('active');
  document.getElementById('edit-label').textContent = '編輯';
  document.getElementById('edit-bar').classList.remove('visible');
}

window.checkPassword = function() {
  const val = document.getElementById('pw-input').value;
  if (val === EDIT_PASSWORD) {
    document.getElementById('pw-modal').classList.remove('visible');
    _enterEditMode();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
};

window.closePwModal = function() {
  document.getElementById('pw-modal').classList.remove('visible');
};

window.discardEdit = function() {
  if (APP.pendingChanges && !confirm('確定要放棄所有未儲存的變更？')) return;
  APP.pendingChanges = false;
  _exitEditMode();
  // Reload from Firebase
  if (window._loadYear) window._loadYear(APP.currentYear);
};

window.saveAll = async function() {
  const btn = document.querySelector('#edit-bar .save-btn');
  btn.textContent = '儲存中…'; btn.disabled = true;
  const ok = await window._saveToFirebase(APP.currentYear);
  btn.textContent = '💾 儲存'; btn.disabled = false;
  if (ok) {
    APP.pendingChanges = false;
    _exitEditMode();
    showToast('✅ 已儲存');
  }
};

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity 0.3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

// ─── Tab switch ───────────────────────────────────────────
window.switchTab = function(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  // Toggle search area (only on phone tab)
  const searchArea = document.getElementById('header-search-area');
  if (searchArea) searchArea.style.display = name === 'phone' ? 'flex' : 'none';
  // Toggle legend
  const legendPhone = document.getElementById('tab-legend-phone');
  const legendMap = document.getElementById('tab-legend-map');
  if (legendPhone) legendPhone.style.display = name === 'phone' ? 'flex' : 'none';
  if (legendMap) legendMap.style.display = name === 'map' ? 'flex' : 'none';
};

// ─── Year picker ──────────────────────────────────────────
window.toggleYearPicker = function() {
  const dd = document.getElementById('year-dropdown');
  dd.classList.toggle('visible');
  if (dd.classList.contains('visible')) renderYearList();
  document.addEventListener('click', closeYearPickerOutside, { once: true });
};

function closeYearPickerOutside(e) {
  const dd = document.getElementById('year-dropdown');
  const toggle = document.getElementById('year-toggle');
  if (!dd.contains(e.target) && !toggle.contains(e.target)) dd.classList.remove('visible');
}

function renderYearList() {
  const list = document.getElementById('year-list');
  list.innerHTML = APP.years.map(y =>
    `<div class="year-option ${y === APP.currentYear ? 'active' : ''}" onclick="selectYear(${y})">
      ${y}學年度 ${y === APP.currentYear ? '<span class="check">✓</span>' : ''}
    </div>`
  ).join('');
}

window.selectYear = function(y) {
  APP.currentYear = y;
  document.getElementById('current-year-label').textContent = y + '學年度';
  document.getElementById('year-dropdown').classList.remove('visible');
  if (window._loadYear) window._loadYear(y);
};

window.newYear = function() {
  const next = Math.max(...APP.years) + 1;
  const confirm_ = confirm(`建立 ${next}學年度？\n將複製 ${APP.currentYear}學年度的資料做為起點。`);
  if (!confirm_) return;
  APP.years.push(next);
  APP.currentYear = next;
  document.getElementById('current-year-label').textContent = next + '學年度';
  document.getElementById('year-dropdown').classList.remove('visible');
  // Data already loaded in memory from current year — just save
  if (window._saveToFirebase) window._saveToFirebase(next).then(() => showToast(`✅ ${next}學年度已建立`));
};

// ─── Export Excel ─────────────────────────────────────────
window.exportExcel = function() {
  if (typeof XLSX === 'undefined') { alert('Excel 套件載入中，請稍後再試'); return; }
  const data = [['編號','職稱','姓名','分機號碼']];
  APP.phoneData.forEach(r => data.push([r.id, r.title, r.name, r.ext]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:6},{wch:16},{wch:10},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${APP.currentYear}學年度分機`);
  XLSX.writeFile(wb, `新莊國小${APP.currentYear}學年度分機一覽表.xlsx`);
};

// ─── Init ─────────────────────────────────────────────────
// Firebase module will call renderPhone + renderMap after loading
// Fallback if Firebase not available yet
setTimeout(() => {
  if (!APP.phoneData.length) {
    APP.phoneData = JSON.parse(JSON.stringify(APP.defaultPhone));
    APP.mapData = JSON.parse(JSON.stringify(APP.defaultMap));
    renderPhone();
    renderMap();
  }
}, 1500);
</script>
